version: "3.9"

services:
  neo4j:
    image: neo4j:5.18-community
    container_name: rag_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme123}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-changeme123}", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: rag_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5

  ollama-init:
    image: curlimages/curl:latest
    container_name: rag_ollama_init
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c "
        curl -s -X POST http://ollama:11434/api/pull -d '{\"name\":\"qwen3.5:9b\"}' &&
        curl -s -X POST http://ollama:11434/api/pull -d '{\"name\":\"nomic-embed-text\"}' &&
        echo 'Models pulled successfully'
      "
    restart: "no"

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_bot
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-changeme123}
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3.5:9b}
      - SEARXNG_URL=${SEARXNG_URL:-https://searx.be}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MAX_NEO4J_RESULTS=${MAX_NEO4J_RESULTS:-10}
      - VERIFIER_ENTROPY_WINDOW=${VERIFIER_ENTROPY_WINDOW:-50}
      - ALLOWED_USERS=${ALLOWED_USERS:-}
    volumes:
      - bot_logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import os; os.path.exists('/app/logs')"]
      interval: 30s
      timeout: 5s
      retries: 3

  searxng:
    image: searxng/searxng:latest
    container_name: rag_searxng
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080
    volumes:
      - ./docker/searxng:/etc/searxng
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID

volumes:
  neo4j_data:
  neo4j_logs:
  ollama_models:
  bot_logs:
